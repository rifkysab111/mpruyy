<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Mpruuyy</title>
    <style>
        /* Gaya Latar Belakang dan Font */
        body {
            background-color: #ffd1dc; /* Warna pink pastel lucu */
            background-image: radial-gradient(#ffb6c1 15%, transparent 15%);
            background-size: 30px 30px;
            font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif;
            margin: 0;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #2c3e50;
        }

        /* Gaya Judul 3D */
        h1 {
            font-size: 3rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ffffff;
            margin-bottom: 60px;
            /* Efek teks 3D berlapis */
            text-shadow: 
                3px 3px 0px #ff6b81, 
                6px 6px 0px #2c3e50;
            border: 4px solid #2c3e50;
            padding: 15px 40px;
            background-color: #ff9ff3;
            border-radius: 20px;
            box-shadow: 8px 8px 0px #2c3e50;
            transform: rotate(-2deg);
        }

        /* Container untuk 3 Gambar */
        .gallery-container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            max-width: 1200px;
        }

        /* Gaya Kartu Gambar 3D */
        .card {
            background-color: #ffffff;
            border: 5px solid #2c3e50;
            border-radius: 25px;
            padding: 20px;
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Bayangan tebal ala kartun 3D */
            box-shadow: 12px 12px 0px #2c3e50;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        /* Efek saat kartu diarahkan mouse (Hover) */
        .card:hover {
            transform: translateY(-10px) translateX(-5px);
            box-shadow: 17px 17px 0px #ff6b81;
        }

        /* Gaya Gambar di dalam Kartu */
        .card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            border: 3px solid #2c3e50;
            margin-bottom: 20px;
        }

        /* Gaya Tombol Download 3D */
        .download-btn {
            background-color: #1dd1a1; /* Warna hijau mint cerah */
            color: #2c3e50;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            padding: 15px 0;
            width: 100%;
            text-align: center;
            border: 4px solid #2c3e50;
            border-radius: 15px;
            box-shadow: 6px 6px 0px #2c3e50;
            transition: all 0.1s;
            cursor: pointer;
        }

        /* Efek Tombol saat Diklik (seperti tombol fisik yang ditekan) */
        .download-btn:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px #2c3e50;
        }

        /* Responsif untuk layar HP */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
                padding: 10px 20px;
            }
            .card {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>

    <h1>gambaranku semua ini mpruuyy!!</h1>

    <div class="gallery-container">
        
        <div class="card">
            <img src="p1.png" alt="Gambar 3D Mpruuyy">
            <a href="p1.png" download="p1_3d.jpg" class="download-btn">Unduh Gambar</a>
        </div>

        <div class="card">
            <img src="p2.png" alt="Gambar Watercolor Mpruuyy">
            <a href="p2.png" download="p2_watercolor.jpg" class="download-btn">Unduh Gambar</a>
        </div>

        <div class="card">
            <img src="p3.png" alt="Gambar Pop Art Mpruuyy">
            <a href="p3.png" download="p3_popart.jpg" class="download-btn">Unduh Gambar</a>
        </div>

    </div>

</body>
</html>
